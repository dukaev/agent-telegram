name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run Go tests
        run: go test ./...

      - name: Run Go race tests
        run: go test -race ./...

      - name: Run contract tests
        run: go test -tags=contracts ./...

      - name: Check generated documentation
        run: go run . docs check --target README.md

      - name: Check auth web app
        run: npm run check:web:auth

  lint:
    name: Lint New Go Issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Find lint base
        id: base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            base_ref="origin/${{ github.base_ref }}"
            base_sha="$(git merge-base HEAD "$base_ref")"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha="HEAD~1"
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Run focused lint on new Go issues
        run: make lint-new-ci LINT_NEW_BASE="${{ steps.base.outputs.sha }}"
